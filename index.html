<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROLANIS DM - Kelompok Desa Terintegrasi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0,react-dom@18.2.0"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; background-color: #f1f5f9; color: #1e293b; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .surface-panel { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025); 
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased selection:bg-indigo-100">
    <div id="root"></div>
    
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Upload, FileSpreadsheet, Download, FileText, FolderOpen, 
          Database, Activity, Loader2, Info, LayoutDashboard, CheckCircle2, 
          Stethoscope, Users, BarChart3, AlertCircle, LogIn, User
        } from 'lucide-react';

        const App = () => {
          const [inputUsername, setInputUsername] = useState('');
          const [activeUser, setActiveUser] = useState('');
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [loginError, setLoginError] = useState('');
          const [uploadErrors, setUploadErrors] = useState([]); 

          const [labFilesData, setLabFilesData] = useState([]);
          const [prolanisFilesData, setProlanisFilesData] = useState([]);
          const [filteredLabData, setFilteredLabData] = useState([]); 
          const [isProcessing, setIsProcessing] = useState(false);
          const [activeTab, setActiveTab] = useState('LAB'); 

          const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

          useEffect(() => {
            if (labFilesData.length > 0 && prolanisFilesData.length > 0) {
              const prolanisBPJSSuffixes = new Set();
              prolanisFilesData.forEach(file => {
                file.data.forEach(row => {
                  const bpjs = String(row['No BPJS'] || "").replace(/[^0-9a-zA-Z]/g, '');
                  if (bpjs.length >= 8) prolanisBPJSSuffixes.add(bpjs.slice(-8));
                });
              });

              const newFilteredLab = labFilesData.map(file => {
                return {
                  ...file,
                  data: file.data.filter(row => {
                    const labBpjs = String(row.Data_R || "").replace(/[^0-9a-zA-Z]/g, '');
                    return labBpjs.length >= 8 && prolanisBPJSSuffixes.has(labBpjs.slice(-8));
                  })
                };
              }).filter(file => file.data.length > 0); 

              setFilteredLabData(newFilteredLab);
            } else {
              setFilteredLabData(labFilesData);
            }
          }, [labFilesData, prolanisFilesData]);

          const handleLoginSubmit = async (e) => {
            e.preventDefault();
            if (!inputUsername.trim()) {
              setLoginError('Username tidak boleh kosong!');
              return;
            }
            
            setIsProcessing(true);
            setLoginError('');

            const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw-E47H0-c-AnIGuVAyx3YGdERYf4jkMqYA8xdpxm83JOq8SeDxaCcVR1MwGt-cprQK/exec';

            if (GAS_WEB_APP_URL === 'PASTE_URL_WEB_APP_ANDA_DISINI') {
              setIsProcessing(false);
              setLoginError('Sistem belum terhubung. Harap isi GAS_WEB_APP_URL di kode HTML.');
              return;
            }

            try {
              const response = await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'login', username: inputUsername })
              });

              const result = await response.json();
              setIsProcessing(false);
              
              if (result.success) {
                setActiveUser(inputUsername);
                setIsLoggedIn(true);
              } else {
                setLoginError(result.error);
              }
            } catch (err) {
              setIsProcessing(false);
              setLoginError('Gagal menghubungi server database Google Spreadsheet.');
            }
          };

          const getMonthName = (value) => {
            if (!value) return "-";
            let monthIndex = -1;
            const strVal = String(value).trim();
            const parts = strVal.split(/[-./]/);
            if (parts.length >= 2) {
              const mPart = parseInt(parts[1], 10);
              if (mPart >= 1 && mPart <= 12) monthIndex = mPart - 1;
            }
            if (monthIndex === -1) {
              const cleanDigits = strVal.replace(/[^0-9]/g, '');
              if (cleanDigits.length === 6) {
                const mPart = parseInt(cleanDigits.substring(2, 4), 10);
                if (mPart >= 1 && mPart <= 12) monthIndex = mPart - 1;
              }
            }
            if (monthIndex === -1) {
              let date;
              if (value instanceof Date) date = value;
              else if (typeof value === 'number') date = new Date(Math.round((value - 25569) * 86400 * 1000));
              else { const parsed = new Date(value); if (!isNaN(parsed.getTime())) date = parsed; }
              if (date && !isNaN(date.getTime())) monthIndex = date.getMonth();
            }
            return monthIndex >= 0 && monthIndex <= 11 ? months[monthIndex] : strVal || "-";
          };

          const getCellValue = (worksheet, r, c) => {
            const XLSX = window.XLSX;
            if (!XLSX) return "";
            let targetCell = worksheet[XLSX.utils.encode_cell({ r, c })];
            if (worksheet['!merges']) {
              for (const merge of worksheet['!merges']) {
                if (r >= merge.s.r && r <= merge.e.r && c >= merge.s.c && c <= merge.e.c) {
                  targetCell = worksheet[XLSX.utils.encode_cell({ r: merge.s.r, c: merge.s.c })];
                  break;
                }
              }
            }
            if (!targetCell) return "";
            if (targetCell.w !== undefined) return String(targetCell.w);
            if (targetCell.v !== undefined) {
               if (targetCell.v instanceof Date) {
                   const d = targetCell.v;
                   return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
               }
               return String(targetCell.v);
            }
            return "";
          };

          const processLabFile = (file) => {
            return new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = window.XLSX.read(data, { type: 'array', cellDates: true, cellText: true });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                
                const cellD3 = String(getCellValue(sheet, 2, 3)).toLowerCase();
                const currentAccount = inputUsername.toLowerCase();
                
                if (!cellD3.includes(currentAccount)) {
                  resolve({ 
                    fileName: file.name, 
                    error: `Gagal Upload [${file.name}]: Identitas instansi pada sel D3 ("${cellD3 || 'Kosong'}") tidak mengandung kata kunci akun Anda ("${inputUsername}").` 
                  });
                  return;
                }

                const range = window.XLSX.utils.decode_range(sheet['!ref']);
                const mergedData = new Map();

                for (let r = 10; r <= range.e.r; r += 2) {
                  const rawB = getCellValue(sheet, r, 1);
                  let rawF = getCellValue(sheet, r, 5) || getCellValue(sheet, r, 4) || getCellValue(sheet, r, 6);
                  const rawV = getCellValue(sheet, r, 21);
                  const rawD = getCellValue(sheet, r, 3);
                  const rawR = getCellValue(sheet, r, 17);
                  const rawH = getCellValue(sheet, r, 7); // Membaca Kolom H (Index 7: A=0, B=1... H=7)

                  if (rawB || rawF || rawV) {
                    const bulan = getMonthName(rawB);
                    const bpjsKey = rawR ? String(rawR).trim() : `NO_BPJS_${r}`;

                    if (!mergedData.has(bpjsKey)) {
                      const newRow = {
                        'Baris': r + 1, 
                        'Data_Pasien': String(rawF || "-"), 
                        'Data_D': String(rawD || "-"), 
                        'Data_R': String(rawR || "-"),
                        'Desa': String(rawH || "Tanpa_Desa") // Menyimpan data desa dari kolom H
                      };
                      months.forEach(m => newRow[m] = ""); 
                      mergedData.set(bpjsKey, newRow);
                    }

                    const record = mergedData.get(bpjsKey);
                    const status = String(rawV || "-");
                    if (months.includes(bulan) && status !== "-") record[bulan] = status;
                  }
                }
                resolve({ fileName: file.name, data: Array.from(mergedData.values()) });
              };
              reader.readAsArrayBuffer(file);
            });
          };

          const processProlanisFile = (file) => {
            return new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = window.XLSX.read(data, { type: 'array', cellDates: true, cellText: true });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const range = window.XLSX.utils.decode_range(sheet['!ref']);
                const mergedProlanisData = new Map();
                
                for (let r = 13; r <= range.e.r; r++) {
                    const nik = getCellValue(sheet, r, 4);
                    const nama = getCellValue(sheet, r, 2);
                    const bpjs = getCellValue(sheet, r, 23);
                    
                    if (!nik && !nama && !bpjs) continue;
                    const nikKey = nik ? String(nik).trim() : `NO_NIK_${r}`;
                    
                    if (!mergedProlanisData.has(nikKey)) {
                        mergedProlanisData.set(nikKey, {
                            'Nama': nama, 'NIK': nik, 'No Tlp': getCellValue(sheet, r, 7),
                            'Jenis Kelamin': getCellValue(sheet, r, 8), 'Alamat': getCellValue(sheet, r, 9), 
                            'RT/RW': getCellValue(sheet, r, 10), 'Kecamatan': getCellValue(sheet, r, 11), 
                            'Kelurahan': getCellValue(sheet, r, 12), 'Tgl Lahir': getCellValue(sheet, r, 13),
                            'Usia': getCellValue(sheet, r, 14), 'No BPJS': bpjs, 'Peserta Prolanis': getCellValue(sheet, r, 36)
                        });
                    }
                }
                resolve({ fileName: file.name, data: Array.from(mergedProlanisData.values()) });
              };
              reader.readAsArrayBuffer(file);
            });
          };

          const handleUpload = async (e, type) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            setIsProcessing(true);
            setUploadErrors([]); 
            
            try {
              const processor = type === 'LAB' ? processLabFile : processProlanisFile;
              const results = await Promise.all(files.filter(f => f.name.match(/\.(xlsx|xls|csv)$/i)).map(processor));
              
              if (type === 'LAB') {
                const errorsFound = results.filter(r => r.error).map(r => r.error);
                const validResults = results.filter(r => !r.error);
                
                if (errorsFound.length > 0) {
                  setUploadErrors(errorsFound);
                  setIsProcessing(false);
                  return; 
                }
                
                setLabFilesData(prev => [...prev, ...validResults]);
                setActiveTab('PROLANIS'); 
              } else {
                setProlanisFilesData(prev => [...prev, ...results]);
                setActiveTab('DASHBOARD'); 
              }
            } catch (err) { console.error(err); } finally { setIsProcessing(false); }
          };

          const downloadFile = (data, type) => {
            const XLSX = window.XLSX;
            if (!XLSX) return;
            const wb = XLSX.utils.book_new();

            if(type === 'LAB'){
                const allRows = data.flatMap(f => f.data);
                
                // 1. MEMBUAT SHEET UTAMA (GABUNGAN SEMUA DATA SEPERTI SEMULA)
                const excelDataAll = allRows.map(row => {
                    const outputRow = { 'Nama Pasien': row.Data_Pasien, 'NIK': row.Data_D, 'No BPJS': row.Data_R };
                    months.forEach(m => outputRow[m] = row[m] || "");
                    return outputRow;
                });
                const wsAll = XLSX.utils.json_to_sheet(excelDataAll, { origin: "A1" });
                XLSX.utils.book_append_sheet(wb, wsAll, "Rekap Lab Terfilter");
                
                // 2. MEMBUAT SHEET TAMBAHAN TERPISAH PER DESA (DARI KOLOM H)
                const groups = allRows.reduce((acc, row) => {
                    const key = row.Desa ? String(row.Desa).trim() : "Tanpa_Desa";
                    if (!acc[key]) acc[key] = [];
                    
                    const outputRow = { 'Nama Pasien': row.Data_Pasien, 'NIK': row.Data_D, 'No BPJS': row.Data_R };
                    months.forEach(m => outputRow[m] = row[m] || "");
                    
                    acc[key].push(outputRow);
                    return acc;
                }, {});
                
                // Memasukkan masing-masing grup desa ke sheet baru di workbook yang sama
                Object.keys(groups).forEach(key => {
                    const wsDesa = XLSX.utils.json_to_sheet(groups[key], { origin: "A1" });
                    XLSX.utils.book_append_sheet(wb, wsDesa, key.substring(0, 31)); // Batas nama sheet maks 31 karakter
                });

                // Perubahan Nama File Lab Disini
                XLSX.writeFile(wb, `Hasil Lab Prolanis.xlsx`);
            } else {
                const allRows = data.flatMap(f => f.data);
                
                // === PROSES DEDUPLIKASI BERDASARKAN NIK ===
                const uniqueRows = [];
                const seenNik = new Set();

                allRows.forEach(row => {
                    const nik = row['NIK'] ? String(row['NIK']).trim() : "";
                    if (nik) {
                        if (!seenNik.has(nik)) {
                            seenNik.add(nik);
                            uniqueRows.push(row);
                        }
                    } else {
                        // Jika kebetulan tidak ada NIK, tetap dimasukkan agar data tidak hilang
                        uniqueRows.push(row);
                    }
                });
                // ===========================================

                const groups = uniqueRows.reduce((acc, row) => {
                    const key = row['Kelurahan'] ? String(row['Kelurahan']) : "Tanpa_Kelurahan";
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(row);
                    return acc;
                }, {});
                
                Object.keys(groups).forEach(key => {
                    const ws = XLSX.utils.json_to_sheet(groups[key]);
                    XLSX.utils.book_append_sheet(wb, ws, key.substring(0, 31)); 
                });
                // Perubahan Nama File Prolanis Disini
                XLSX.writeFile(wb, `Peserta Prolanis Puskesmas ${activeUser}.xlsx`);
            }
          };

          const getTotalRows = (dataArray) => dataArray.reduce((acc, file) => acc + file.data.length, 0);

          const getUniqueProlanisCount = (dataArray) => {
            const allRows = dataArray.flatMap(f => f.data);
            const seenNik = new Set();
            let count = 0;
            allRows.forEach(row => {
                const nik = row['NIK'] ? String(row['NIK']).trim() : "";
                if (nik) {
                    if (!seenNik.has(nik)) {
                        seenNik.add(nik);
                        count++;
                    }
                } else {
                    count++; // Menghitung baris tanpa NIK sebagai data tersendiri agar tidak hilang
                }
            });
            return count;
          };

          if (!isLoggedIn) {
            return (
              <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100 relative overflow-hidden font-sans">
                {}
                <div className="absolute top-[-10%] left-[-10%] w-[30rem] h-[30rem] bg-blue-400/20 rounded-full blur-[100px] animate-pulse"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[30rem] h-[30rem] bg-indigo-400/20 rounded-full blur-[100px] animate-pulse" style={{ animationDelay: '2s' }}></div>
                
                {}
                <div className="w-full max-w-md bg-gradient-to-br from-blue-600 to-blue-900 p-10 rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.7)] border border-blue-500/30 relative z-10 animate-in fade-in zoom-in-95 duration-700 transition-all hover:shadow-[0_35px_70px_-15px_rgba(0,0,0,0.8)] hover:-translate-y-2 ease-out">
                  <div className="text-center mb-10">
                    <div className="relative w-20 h-20 mx-auto mb-6">
                      <div className="absolute inset-0 bg-blue-800 rounded-3xl rotate-6 animate-pulse"></div>
                      <div className="absolute inset-0 bg-gradient-to-br from-blue-400 to-sky-400 rounded-3xl -rotate-6 opacity-90 backdrop-blur-sm transition-transform hover:rotate-0 duration-500"></div>
                      <div className="absolute inset-0 bg-blue-900 rounded-2xl m-1 flex items-center justify-center shadow-[inset_0_2px_10px_rgba(0,0,0,0.3)]">
                        <Stethoscope className="w-10 h-10 text-white" />
                      </div>
                    </div>
                    <h1 className="text-4xl font-black tracking-tighter text-white mb-2 drop-shadow-md">PROLANIS DM</h1>
                    <p className="text-xs font-bold text-blue-200 tracking-[0.2em] uppercase">Sistem Otomasi Data Pasien</p>
                  </div>

                  <form onSubmit={handleLoginSubmit} className="space-y-6">
                    <div>
                      <label className="block text-[11px] font-bold uppercase tracking-wider text-blue-200 mb-2 ml-1">Username Pengguna</label>
                      <div className="relative group">
                        <div className="absolute left-4 top-3.5 p-1 bg-white/10 rounded-lg group-focus-within:bg-white/30 transition-colors duration-300 z-10 backdrop-blur-sm">
                            <User className="w-5 h-5 text-blue-200 group-focus-within:text-white transition-colors duration-300" />
                        </div>
                        <input 
                          type="text" 
                          placeholder="Masukkan nama atau NIP..."
                          value={inputUsername}
                          onChange={(e) => setInputUsername(e.target.value)}
                          className="w-full relative bg-blue-900/40 border-2 border-blue-400/30 rounded-2xl py-4 pl-14 pr-4 text-sm font-medium text-white placeholder-blue-300/70 focus:outline-none focus:border-white/80 focus:ring-4 focus:ring-white/20 focus:bg-blue-800/60 transition-all shadow-inner backdrop-blur-sm"
                        />
                      </div>
                    </div>

                    {loginError && (
                      <div className="flex items-center gap-3 text-sm font-medium text-white bg-red-500/20 p-4 rounded-2xl border border-red-400/50 shadow-sm backdrop-blur-sm animate-in slide-in-from-top-2 duration-300">
                        <div className="bg-red-500/30 p-1.5 rounded-full shrink-0"><AlertCircle size={16} className="text-red-200" /></div> 
                        <p>{loginError}</p>
                      </div>
                    )}

                    <button type="submit" className="w-full relative group overflow-hidden flex items-center justify-center gap-2 bg-white hover:bg-blue-50 text-blue-800 font-bold py-4 rounded-2xl text-sm transition-all shadow-[0_10px_20px_-5px_rgba(0,0,0,0.3)] hover:shadow-[0_15px_25px_-5px_rgba(0,0,0,0.5)] hover:-translate-y-1 transform duration-300 active:scale-95">
                      <LogIn size={18} className="relative z-10 group-hover:translate-x-1 transition-transform duration-300" /> 
                      <span className="relative z-10">Masuk ke Aplikasi</span>
                    </button>
                  </form>
                </div>

                {isProcessing && (
                  <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex flex-col items-center justify-center text-slate-800">
                    <div className="bg-white p-8 rounded-[2rem] shadow-2xl border border-white flex flex-col items-center text-center animate-in zoom-in-95 duration-300">
                      <div className="relative w-16 h-16 mb-6">
                         <div className="absolute inset-0 border-4 border-blue-100 rounded-full"></div>
                         <div className="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
                      </div>
                      <h2 className="text-2xl font-black tracking-tight text-slate-800 mb-2">Verifikasi...</h2>
                      <p className="text-slate-500 text-sm font-medium">Memeriksa kredensial pada sistem</p>
                    </div>
                  </div>
                )}
              </div>
            );
          }

          return (
            <div className="pb-24 font-sans text-slate-700">
              <nav className="bg-white sticky top-0 z-40 border-b border-slate-200 shadow-sm">
                <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                  <div className="flex items-center gap-4">
                    <div className="bg-indigo-600 p-2.5 rounded-xl shadow-md">
                      <Stethoscope className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight leading-none">PROLANIS DM</h1>
                      <p className="text-[10px] uppercase tracking-widest text-indigo-600 font-bold mt-1">User: {activeUser}</p>
                    </div>
                  </div>
                  
                  {}
                  <div className="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200 shadow-inner">
                    {[
                      { id: 'LAB', icon: Database, label: '1. Data Lab', color: 'blue' },
                      { id: 'PROLANIS', icon: Users, label: '2. Prolanis', color: 'emerald' },
                      { id: 'DASHBOARD', icon: LayoutDashboard, label: 'Dashboard', color: 'indigo' }
                    ].map(tab => {
                      const isActive = activeTab === tab.id;
                      let btnClass = `group flex items-center gap-2 px-3 md:px-5 py-2 rounded-lg text-xs md:text-sm font-bold transition-all duration-500 transform border border-transparent `;
                      let iconClass = `transition-transform duration-500 ${isActive ? 'scale-110' : 'group-hover:scale-110'} `;

                      if (isActive) {
                        if (tab.color === 'blue') { btnClass += 'bg-white text-blue-700 shadow-md border-slate-200 scale-[1.02]'; iconClass += 'text-blue-600'; }
                        if (tab.color === 'emerald') { btnClass += 'bg-white text-emerald-700 shadow-md border-slate-200 scale-[1.02]'; iconClass += 'text-emerald-600'; }
                        if (tab.color === 'indigo') { btnClass += 'bg-white text-indigo-700 shadow-md border-slate-200 scale-[1.02]'; iconClass += 'text-indigo-600'; }
                      } else {
                        btnClass += 'text-slate-500 hover:bg-slate-200/50 hover:scale-105 hover:shadow-sm ';
                        if (tab.color === 'blue') btnClass += 'hover:text-blue-600';
                        if (tab.color === 'emerald') btnClass += 'hover:text-emerald-600';
                        if (tab.color === 'indigo') btnClass += 'hover:text-indigo-600';
                      }

                      return (
                        <button 
                          key={tab.id}
                          onClick={() => setActiveTab(tab.id)} 
                          className={btnClass}
                        >
                          <tab.icon size={16} className={iconClass} /> 
                          <span className="hidden sm:inline">{tab.label}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </nav>

              <main className="max-w-7xl mx-auto px-6 pt-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
                {activeTab === 'LAB' && (
                  <div className="max-w-3xl mx-auto space-y-6">
                    <div className="bg-gradient-to-br from-blue-600 to-blue-900 p-10 rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.6)] border border-blue-500/30 text-center transform transition-all duration-500 hover:shadow-[0_35px_70px_-15px_rgba(0,0,0,0.7)] hover:-translate-y-2 relative overflow-hidden group">
                      
                      {/* Ambient Orbs */}
                      <div className="absolute top-[-20%] left-[-10%] w-64 h-64 bg-white/10 rounded-full blur-3xl group-hover:bg-white/20 transition-colors duration-700"></div>
                      <div className="absolute bottom-[-20%] right-[-10%] w-64 h-64 bg-sky-400/10 rounded-full blur-3xl group-hover:bg-sky-400/20 transition-colors duration-700"></div>

                      <div className="relative z-10">
                        <div className="relative w-20 h-20 mx-auto mb-6">
                          <div className="absolute inset-0 bg-blue-800 rounded-3xl rotate-6 animate-pulse"></div>
                          <div className="absolute inset-0 bg-gradient-to-br from-blue-400 to-sky-400 rounded-3xl -rotate-6 opacity-90 backdrop-blur-sm transition-transform hover:rotate-0 duration-500"></div>
                          <div className="absolute inset-0 bg-blue-900 rounded-2xl m-1 flex items-center justify-center shadow-[inset_0_2px_10px_rgba(0,0,0,0.3)]">
                            <Database className="w-10 h-10 text-white" />
                          </div>
                        </div>
                        <h2 className="text-3xl font-black text-white mb-3 drop-shadow-md tracking-tight">Langkah 1: Upload Data Lab</h2>
                        <p className="text-blue-100 mb-10 text-sm leading-relaxed font-medium">Unggah folder laboratorium. Sistem otomatis mengeliminasi duplikat BPJS dan mencocokkan identitas file pada sel D3 dengan kata kunci nama akun Anda.</p>
                        
                        <label className="group/drop relative block w-full border-2 border-dashed border-blue-300/40 hover:border-white bg-blue-900/40 hover:bg-blue-800/60 transition-all duration-500 rounded-[2rem] p-12 cursor-pointer shadow-inner backdrop-blur-md">
                          <div className="flex flex-col items-center gap-5">
                            <FolderOpen className="w-12 h-12 text-blue-200 group-hover/drop:text-white group-hover/drop:scale-125 transition-transform duration-500" />
                            <div className="bg-white text-blue-800 px-8 py-3.5 rounded-full font-bold text-sm shadow-[0_10px_20px_-5px_rgba(0,0,0,0.3)] group-hover/drop:shadow-[0_15px_25px_-5px_rgba(0,0,0,0.5)] group-hover/drop:bg-blue-50 transition-all duration-300 transform group-hover/drop:-translate-y-1">Pilih Folder Lab</div>
                          </div>
                          <input type="file" multiple webkitdirectory="true" className="hidden" onChange={(e) => handleUpload(e, 'LAB')} />
                        </label>
                      </div>
                    </div>

                    {uploadErrors.length > 0 && (
                      <div className="bg-red-50 p-6 rounded-2xl border border-red-200 shadow-lg shadow-red-500/10 space-y-2 animate-in fade-in slide-in-from-top-2 duration-300">
                        <h4 className="font-extrabold text-red-700 flex items-center gap-2 text-sm">
                          <AlertCircle size={18} /> Berkas Gagal Diunggah:
                        </h4>
                        <ul className="list-disc pl-5 space-y-1 text-xs text-red-600 font-medium">
                          {uploadErrors.map((err, idx) => <li key={idx}>{err}</li>)}
                        </ul>
                      </div>
                    )}
                  </div>
                )}

                {activeTab === 'PROLANIS' && (
                  <div className="max-w-3xl mx-auto">
                    <div className="bg-gradient-to-br from-emerald-600 to-emerald-900 p-10 rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.6)] border border-emerald-500/30 text-center transform transition-all duration-500 hover:shadow-[0_35px_70px_-15px_rgba(0,0,0,0.7)] hover:-translate-y-2 relative overflow-hidden group">
                      
                      {/* Ambient Orbs */}
                      <div className="absolute top-[-20%] left-[-10%] w-64 h-64 bg-white/10 rounded-full blur-3xl group-hover:bg-white/20 transition-colors duration-700"></div>
                      <div className="absolute bottom-[-20%] right-[-10%] w-64 h-64 bg-teal-400/10 rounded-full blur-3xl group-hover:bg-teal-400/20 transition-colors duration-700"></div>

                      <div className="relative z-10">
                        <div className="relative w-20 h-20 mx-auto mb-6">
                          <div className="absolute inset-0 bg-emerald-800 rounded-3xl rotate-6 animate-pulse"></div>
                          <div className="absolute inset-0 bg-gradient-to-br from-emerald-400 to-teal-400 rounded-3xl -rotate-6 opacity-90 backdrop-blur-sm transition-transform hover:rotate-0 duration-500"></div>
                          <div className="absolute inset-0 bg-emerald-900 rounded-2xl m-1 flex items-center justify-center shadow-[inset_0_2px_10px_rgba(0,0,0,0.3)]">
                            <Users className="w-10 h-10 text-white" />
                          </div>
                        </div>
                        <h2 className="text-3xl font-black text-white mb-3 drop-shadow-md tracking-tight">Langkah 2: Upload Data Prolanis</h2>
                        <p className="text-emerald-100 mb-10 text-sm leading-relaxed font-medium">Unggah folder Prolanis untuk memfilter data Lab (8 digit BPJS terakhir). Sistem juga menghapus duplikat data berdasarkan kolom NIK.</p>
                        
                        <label className="group/drop relative block w-full border-2 border-dashed border-emerald-300/40 hover:border-white bg-emerald-900/40 hover:bg-emerald-800/60 transition-all duration-500 rounded-[2rem] p-12 cursor-pointer shadow-inner backdrop-blur-md">
                          <div className="flex flex-col items-center gap-5">
                            <FolderOpen className="w-12 h-12 text-emerald-200 group-hover/drop:text-white group-hover/drop:scale-125 transition-transform duration-500" />
                            <div className="bg-white text-emerald-800 px-8 py-3.5 rounded-full font-bold text-sm shadow-[0_10px_20px_-5px_rgba(0,0,0,0.3)] group-hover/drop:shadow-[0_15px_25px_-5px_rgba(0,0,0,0.5)] group-hover/drop:bg-emerald-50 transition-all duration-300 transform group-hover/drop:-translate-y-1">Pilih Folder Prolanis</div>
                          </div>
                          <input type="file" multiple webkitdirectory="true" className="hidden" onChange={(e) => handleUpload(e, 'PROLANIS')} />
                        </label>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'DASHBOARD' && (
                  <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div className="surface-panel p-6 rounded-2xl flex items-center gap-5 transform transition-all duration-500 hover:shadow-2xl hover:-translate-y-2 cursor-default group">
                        <div className="bg-slate-100 p-4 rounded-xl border border-slate-200 group-hover:bg-slate-200 transition-colors duration-300 group-hover:scale-110 transform"><FileText className="w-7 h-7 text-slate-500 group-hover:text-slate-700 transition-colors" /></div>
                        <div>
                          <p className="text-sm font-bold text-slate-500 uppercase tracking-wide">Total Pasien Lab</p>
                          <p className="text-3xl font-black text-slate-800 mt-1">{getTotalRows(labFilesData)}</p>
                        </div>
                      </div>
                      <div className="surface-panel p-6 rounded-2xl flex items-center gap-5 transform transition-all duration-500 hover:shadow-2xl hover:-translate-y-2 cursor-default group">
                        <div className="bg-slate-100 p-4 rounded-xl border border-slate-200 group-hover:bg-slate-200 transition-colors duration-300 group-hover:scale-110 transform"><Users className="w-7 h-7 text-slate-500 group-hover:text-slate-700 transition-colors" /></div>
                        <div>
                          <p className="text-sm font-bold text-slate-500 uppercase tracking-wide">Total Pasien Prolanis</p>
                          <div className="flex items-baseline gap-2">
                             <p className="text-3xl font-black text-slate-800 mt-1">{getUniqueProlanisCount(prolanisFilesData)}</p>
                             <span className="text-[10px] font-bold text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded-full uppercase tracking-wider">Unik</span>
                          </div>
                        </div>
                      </div>
                      <div className="bg-white p-6 rounded-2xl border-2 border-indigo-100 shadow-lg flex items-center gap-5 relative overflow-hidden transform transition-all duration-500 hover:shadow-2xl hover:border-indigo-300 hover:-translate-y-2 cursor-default group">
                        <div className="absolute right-0 top-0 w-32 h-32 bg-indigo-50 rounded-full -mr-10 -mt-10 blur-2xl group-hover:bg-indigo-100 transition-colors duration-500"></div>
                        <div className="bg-indigo-100 p-4 rounded-xl border border-indigo-200 group-hover:bg-indigo-200 transition-colors duration-300 group-hover:scale-110 transform z-10"><CheckCircle2 className="w-7 h-7 text-indigo-600" /></div>
                        <div className="z-10">
                          <p className="text-sm font-bold text-indigo-600 uppercase tracking-wide">Data Tervalidasi</p>
                          <div className="flex items-baseline gap-2">
                             <p className="text-3xl font-black text-slate-800 mt-1">{getTotalRows(filteredLabData)}</p>
                             <span className="text-[10px] font-bold text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded-full uppercase tracking-wider">Cocok</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="bg-gradient-to-r from-slate-800 to-slate-900 p-8 rounded-[2.5rem] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] border border-slate-700 flex flex-col lg:flex-row items-center justify-between gap-6 transform transition-all duration-500 hover:shadow-[0_30px_60px_-15px_rgba(0,0,0,0.6)] hover:-translate-y-1 relative overflow-hidden group">
                      {/* Ambient background for Panel */}
                      <div className="absolute right-0 top-[-50%] w-64 h-64 bg-indigo-500/10 rounded-full blur-3xl group-hover:bg-indigo-500/20 transition-colors duration-700"></div>
                      
                      <div className="relative z-10 flex items-start gap-4">
                        <div className="bg-slate-700/50 p-3 rounded-2xl shrink-0 border border-slate-600 backdrop-blur-sm"><Info className="w-6 h-6 text-indigo-400" /></div>
                        <p className="text-sm text-slate-300 leading-relaxed max-w-2xl font-medium mt-1">
                          Hasil rekapitulasi terfilter. File telah diverifikasi menggunakan akun: <strong className="text-white bg-slate-700 px-2.5 py-1 rounded-lg ml-1 tracking-wide">{activeUser}</strong>
                        </p>
                      </div>
                      <div className="relative z-10 flex gap-4 w-full lg:w-auto">
                        <button onClick={() => downloadFile(filteredLabData, 'LAB')} disabled={filteredLabData.length === 0} className="group/btn flex-1 flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 disabled:hover:translate-y-0 disabled:border-transparent text-white px-6 py-4 rounded-2xl text-sm font-bold shadow-[0_10px_20px_-5px_rgba(37,99,235,0.4)] hover:shadow-[0_15px_25px_-5px_rgba(37,99,235,0.6)] hover:-translate-y-1 whitespace-nowrap transition-all duration-300 transform active:scale-95 border border-blue-400/50">
                          <Download size={18} className="group-hover/btn:-translate-y-1 transition-transform duration-300" /> Unduh Rekap Lab
                        </button>
                        <button onClick={() => downloadFile(prolanisFilesData, 'PROLANIS')} disabled={prolanisFilesData.length === 0} className="group/btn flex-1 flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 disabled:text-slate-500 disabled:hover:translate-y-0 disabled:border-transparent text-white px-6 py-4 rounded-2xl text-sm font-bold shadow-[0_10px_20px_-5px_rgba(5,150,105,0.4)] hover:shadow-[0_15px_25px_-5px_rgba(5,150,105,0.6)] hover:-translate-y-1 whitespace-nowrap transition-all duration-300 transform active:scale-95 border border-emerald-400/50">
                          <Download size={18} className="group-hover/btn:-translate-y-1 transition-transform duration-300" /> Unduh Prolanis
                        </button>
                      </div>
                    </div>

                    {filteredLabData.length === 0 ? (
                      <div className="bg-gradient-to-b from-slate-100 to-white py-24 flex flex-col items-center justify-center text-center rounded-[2.5rem] border border-slate-200 transform transition-all duration-500 hover:shadow-xl hover:-translate-y-1">
                        <div className="bg-slate-200/50 p-6 rounded-full mb-6 transition-transform duration-500 hover:scale-110 hover:rotate-6"><AlertCircle className="w-12 h-12 text-slate-400" /></div>
                        <h3 className="text-xl font-extrabold text-slate-800 mb-2">Belum Ada Data Tersedia</h3>
                        <p className="text-slate-500 text-sm font-medium">Pastikan Anda telah mengunggah file Lab dan Prolanis yang sesuai ketentuan akun.</p>
                      </div>
                    ) : (
                      <div className="surface-panel rounded-[2rem] overflow-hidden transform transition-all duration-500 hover:shadow-2xl border-slate-200">
                        <div className="bg-gradient-to-r from-slate-50 to-white px-6 py-5 border-b border-slate-200 flex items-center gap-3">
                          <BarChart3 className="text-indigo-600 w-6 h-6"/> <h3 className="font-extrabold text-slate-800 text-lg tracking-tight">Pratinjau Rekapitulasi Terpadu</h3>
                        </div>
                        <div className="overflow-x-auto max-h-[500px] relative">
                          <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-slate-100/80 text-slate-600 font-bold sticky top-0 z-20 shadow-sm backdrop-blur-md border-b border-slate-200">
                              <tr>
                                  <th className="px-6 py-4">Nama Pasien</th>
                                  <th className="px-6 py-4">NIK</th>
                                  <th className="px-6 py-4">No BPJS</th>
                                  {months.map(m => <th key={m} className="px-6 py-4 text-center">{m.substring(0,3)}</th>)}
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 bg-white">
                              {filteredLabData.flatMap(f => f.data).map((row, r) => (
                                <tr key={r} className="hover:bg-slate-50 transition-colors group">
                                  <td className="px-6 py-4 font-bold text-slate-800 group-hover:text-indigo-700 transition-colors">{row.Data_Pasien}</td>
                                  <td className="px-6 py-4 text-slate-600">{row.Data_D}</td>
                                  <td className="px-6 py-4 font-mono text-slate-500">{row.Data_R}</td>
                                  {months.map(m => (
                                    <td key={m} className="px-6 py-4 text-center">
                                      {row[m] ? (
                                        <span className="inline-flex items-center justify-center px-3 py-1 bg-indigo-50 text-indigo-700 text-xs font-bold rounded-md border border-indigo-100 shadow-sm">
                                          {row[m]}
                                        </span>
                                      ) : (
                                        <span className="text-slate-300">-</span>
                                      )}
                                    </td>
                                  ))}
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </main>

              {isProcessing && (
                <div className="fixed inset-0 z-50 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center text-slate-800">
                  <div className="bg-white p-6 rounded-2xl shadow-xl border border-slate-200 flex flex-col items-center text-center">
                    <Loader2 className="w-12 h-12 text-indigo-600 animate-spin mb-4" />
                    <h2 className="text-xl font-extrabold tracking-tight text-slate-800 mb-1">Memproses Data</h2>
                    <p className="text-slate-500 text-sm font-medium">Menyesuaikan dokumen & mengekstrak data...</p>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
